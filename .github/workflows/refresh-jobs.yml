name: Refresh ChristianaCare jobs site

on:
  workflow_dispatch:
  schedule:
    - cron: '17 5 * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install lxml  

      - name: Build site from XML feed
        env:
          FEED_URL: https://careers-cms.christianacare.org/google/feed.php
          BASE_URL: https://oleeo-recruit.github.io/test-xml-christiana-care
          SITE_TITLE: ChristianaCare Jobs
          OUT_DIR: site
          DEBUG_DIR: build-debug
        run: python scripts/build_jobs_site.py

      - name: Smoke test generated files

        run: |
          test -f site/index.html
          test -f site/sitemap.xml
          test -f site/robots.txt
          test -f site/voiceflow-urls.txt
          test -f site/page-2.html
          test -d site/jobs
          python - <<'PY'
          from pathlib import Path
          import json
      
          index_text = Path("site/index.html").read_text(encoding="utf-8")
          assert "<html" in index_text.lower()
          assert "Last refreshed:" in index_text
      
          summary = json.loads(Path("build-debug/summary.json").read_text(encoding="utf-8"))
          assert summary["jobs_built"] >= 1, "No jobs were built"
          assert summary["pages_built"] >= 2, "Pagination was not generated"
          print("Smoke tests passed")
          print(json.dumps(summary, indent=2))
          PY

      - name: Upload debug artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-debug
          path: build-debug

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
